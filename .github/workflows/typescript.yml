name: TypeScript

on:
  push:
    branches: [master, main]
  pull_request:
  release:
    types: [published]

jobs:
  ci:
    name: CI (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # package-lock.json is gitignored in this repo (see CLAUDE.md), so use
      # `npm install` rather than `npm ci`. better-sqlite3 is a native dep but
      # ships ubuntu prebuilds, so install resolves without a local toolchain.
      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # SKIP_BENCHMARKS=true gates the perf-benchmark suites (honored per-test);
      # test:ci additionally excludes tests/performance/**.
      - name: Test
        run: npm run test:ci
        env:
          SKIP_BENCHMARKS: "true"

      - name: Build
        run: npm run build

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'release'
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      # prepublishOnly (clean + build + test:ci) runs automatically on publish.
      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SKIP_BENCHMARKS: "true"
